name: Sync Levanta payments

on:
  schedule:
    # 10:00 Asia/Shanghai is 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-payments:
    name: Pull Vercel payments and update static data
    runs-on: ubuntu-latest
    env:
      PAYMENT_SYNC_SOURCE_URL: ${{ vars.PAYMENT_SYNC_SOURCE_URL }}
      PAYMENT_SYNC_TOKEN: ${{ secrets.PAYMENT_SYNC_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Levanta payment records from Vercel
        run: python scripts/sync_levanta_payments.py --start 2026-03 --end 2026-06 --source-url "$PAYMENT_SYNC_SOURCE_URL"

      - name: Validate payment placeholders
        run: python scripts/test_payment_placeholders.py

      - name: Install PyMySQL for DB sync
        if: ${{ vars.OFFER_DB_HOST != '' }}
        run: pip install PyMySQL==1.1.1

      - name: Ensure cnpscy_oi schema (tables + views)
        if: ${{ vars.OFFER_DB_HOST != '' }}
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
        run: python scripts/ensure_oi_schema.py

      - name: Sync data to cnpscy_oi_* tables
        if: ${{ vars.OFFER_DB_HOST != '' }}
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
        run: python scripts/sync_oi_tables.py

      - name: Rebuild API caches from DB
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
          OFFER_DB_READ_TIMEOUT: "300"
        run: python scripts/refresh_api_caches.py

      - name: Commit updated data and caches
        run: |
          git add protected_data/db_offers_cache.json protected_data/db_keywords_cache.json 2>/dev/null || true
          if git diff --cached --quiet && git diff --quiet -- protected_data/chatbot_data.js; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add protected_data/chatbot_data.js
          git commit -m "Update DB caches and payment data"
          git push
