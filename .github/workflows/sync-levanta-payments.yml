name: Sync Levanta payments

on:
  schedule:
    # 10:00 Asia/Shanghai is 02:00 UTC.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-levanta-payments-main
  cancel-in-progress: false

jobs:
  sync-payments:
    name: Pull Vercel payments and sync DB
    if: github.repository == 'bryansaputra68YP/offer-intelligence'
    runs-on: ubuntu-latest
    env:
      PAYMENT_SYNC_SOURCE_URL: ${{ vars.PAYMENT_SYNC_SOURCE_URL }}
      PAYMENT_SYNC_TOKEN: ${{ secrets.PAYMENT_SYNC_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyMySQL for DB sync
        run: pip install PyMySQL==1.1.1

      - name: Ensure cnpscy_oi schema (tables + views)
        if: ${{ vars.OFFER_DB_HOST != '' }}
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
        run: python scripts/ensure_oi_schema.py

      - name: Sync Levanta payment records to DB
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
        run: |
          python scripts/sync_levanta_payments.py \
            --start 2026-03 --end 2026-06 \
            --source-url "$PAYMENT_SYNC_SOURCE_URL" \
            --records-output output/payment_records.json

      - name: Validate payment records
        run: python scripts/test_payment_placeholders.py --records-file output/payment_records.json

      - name: Sync non-manual cnpscy_oi_* tables
        if: ${{ vars.OFFER_DB_HOST != '' }}
        env:
          OFFER_DB_HOST: ${{ vars.OFFER_DB_HOST }}
          OFFER_DB_NAME: ${{ vars.OFFER_DB_NAME }}
          OFFER_DB_USER: ${{ vars.OFFER_DB_USER }}
          OFFER_DB_PASSWORD: ${{ secrets.OFFER_DB_PASSWORD }}
          OFFER_DB_PORT: ${{ vars.OFFER_DB_PORT }}
        # Tier assignments and visual colors are excluded by default so
        # scheduled jobs cannot overwrite manual operator changes.
        run: python scripts/sync_oi_tables.py
